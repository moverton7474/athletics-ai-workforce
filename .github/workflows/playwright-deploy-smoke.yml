name: Playwright deploy smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Optional deployed URL to test'
        required: false
        type: string
  deployment_status:

jobs:
  smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success')
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: ${{ inputs.base_url || github.event.deployment_status.target_url || vars.PLAYWRIGHT_BASE_URL || 'https://athletics-ai-workforce-web.vercel.app' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run deployed smoke suite
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
